name: CI

on:
  push:
    branches: [dev, develop, feat/*, feature/*]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env.local
        shell: bash
        run: |
          cat > .env.local << 'EOF'
          VITE_FIREBASE_API_KEY=AIzaSyCDE8MyKZnlvBraESAHGb7JyyLZJuP8ijU
          VITE_FIREBASE_AUTH_DOMAIN=wakfarm-p2p.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID=wakfarm-p2p
          VITE_FIREBASE_STORAGE_BUCKET=wakfarm-p2p.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID=742884437476
          VITE_FIREBASE_APP_ID=1:742884437476:web:d0a97061e96f6ac9902bf1
          EOF

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env.local
        shell: bash
        run: |
          cat > .env.local << 'EOF'
          VITE_FIREBASE_API_KEY=AIzaSyCDE8MyKZnlvBraESAHGb7JyyLZJuP8ijU
          VITE_FIREBASE_AUTH_DOMAIN=wakfarm-p2p.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID=wakfarm-p2p
          VITE_FIREBASE_STORAGE_BUCKET=wakfarm-p2p.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID=742884437476
          VITE_FIREBASE_APP_ID=1:742884437476:web:d0a97061e96f6ac9902bf1
          EOF

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: wakfarm-dist
          path: dist/**
